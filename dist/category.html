<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 목록 - 오늘 뭐 먹지?</title>
  <meta name="description" content="카테고리별 요리 목록과 즐겨찾는 레시피를 확인하세요.">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (Outfit & Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans KR', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          boxShadow: {
            'neon-purple': '0 0 20px rgba(168, 85, 247, 0.25)',
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
          }
        }
      }
    }
  </script>
  
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Glassmorphism utility */
    .glassmorphism {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-zinc-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-purple-500 selection:text-white">

  <!-- Header -->
  <header class="border-b border-slate-800/60 sticky top-0 z-40 backdrop-blur-md bg-slate-950/80">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-3 group">
        <div class="bg-slate-800/80 p-2.5 rounded-2xl border border-slate-700/50 group-hover:border-purple-500/50 transition-colors">
          <svg class="w-5 h-5 text-slate-300 group-hover:text-purple-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-black tracking-tight font-outfit bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
            WHAT TO EAT
          </h1>
          <p class="text-xs text-slate-400 font-medium">홈으로 돌아가기</p>
        </div>
      </a>
      
      <!-- Nav Tabs -->
      <nav class="flex items-center space-x-1 text-xs bg-slate-900/60 p-1 rounded-xl border border-slate-800 max-w-full overflow-x-auto no-scrollbar scroll-smooth">
        <a href="category.html?type=korean" id="nav-korean" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-white transition-all font-medium whitespace-nowrap">한식</a>
        <a href="category.html?type=chinese" id="nav-chinese" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-white transition-all font-medium whitespace-nowrap">중식</a>
        <a href="category.html?type=western" id="nav-western" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-white transition-all font-medium whitespace-nowrap">양식</a>
        <a href="category.html?type=japanese" id="nav-japanese" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-white transition-all font-medium whitespace-nowrap">일식</a>
        <a href="category.html?type=side" id="nav-side" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-white transition-all font-medium whitespace-nowrap">반찬</a>
        <a href="category.html?type=tip" id="nav-tip" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-emerald-400 transition-all font-medium whitespace-nowrap">📝 식재료 팁</a>
        <span class="w-[1px] h-4 bg-slate-800 mx-1 flex-shrink-0"></span>
        <a href="category.html?type=favorite" id="nav-favorite" class="px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-amber-400 transition-all font-semibold flex items-center space-x-1 whitespace-nowrap">
          <span>⭐️</span><span>찜 목록</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
    
    <!-- Title & Category Info -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <h2 id="categoryTitle" class="text-3xl font-extrabold bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
          레시피 목록
        </h2>
        <p id="categorySubtitle" class="text-sm text-slate-400 mt-1">카테고리 요리 리스트입니다.</p>
      </div>
      
      <!-- Back to Roulette Button -->
      <a href="index.html" class="inline-flex items-center space-x-2 px-4 py-2 rounded-xl bg-purple-900/30 border border-purple-800/40 text-purple-300 hover:bg-purple-800/30 transition-all text-sm font-semibold self-start sm:self-auto">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5"></path>
        </svg>
        <span>룰렛 돌리러 가기</span>
      </a>
    </div>

    <!-- Recipe List Container -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="recipeListContainer">
      <!-- Cards will be dynamically rendered here via recipe.js -->
      <div class="col-span-full py-20 flex flex-col items-center justify-center space-y-4">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-500"></div>
        <p class="text-slate-400 text-sm font-medium">요리 레시피를 가져오는 중...</p>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800/40 bg-slate-950/60 py-6 mt-12 text-center text-xs text-slate-500">
    <div class="max-w-6xl mx-auto px-4 space-y-2">
      <p>© 2026 What-To-Eat. All rights reserved.</p>
      <p class="text-slate-600">※ 본 서비스의 일부 링크는 쿠팡 파트너스 활동의 일환으로 소정의 수수료를 제공받을 수 있습니다.</p>
    </div>
  </footer>

  <!-- Web App Logic -->
  <script src="sheets.js"></script>
  <script src="recipe.js"></script>
</body>
</html>
